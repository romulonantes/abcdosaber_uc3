{% extends "base_template.html" %}

{% block title %}
    <title>AbcDoSaber - Título</title>
{% endblock %}

{% block menu %}
    <div class="collapse navbar-collapse justify-content-end" id="mynavbar">
        <div class="navbar-nav">
            <a href="/" class="nav-link">Início</a>
            <a href="{% url 'titulo:cadastrar' %}" class="nav-link">Cadastrar</a>
            <a href="{% url 'titulo:listar' %}" class="nav-link">Listar</a>
        </div>
    </div>
{% endblock %}

{% block titulo_pagina %}
{% endblock %}

{% block corpo %}
    <main class="container m-2 w-75 mx-auto">
        <form action="#" method="POST" name="frmCadastrarTitulo" id="idFrmCadastrarTitulo">
            <div class="form-group">
                <label for='idDescricao'>Descrição</label>
                <input class="form-control" type='text' id='idDescricao' name='descricao' placeholder='Informe a descrição' required>
            </div>
            <div class='form-group text-center'>
                <input type='reset'  value='Limpar' class='btn btn-primary btn-md'>
                <input type='submit' value='Cadastrar' class='btn btn-primary btn-md' id="btnCadastrarTitulo">
            </div>
        </form>
    </main>
{% endblock %}
